name: Fetch NAVWARN Data

on:
  schedule:
    - cron: '0 0,6,12,18 * * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Fetch all data
        env:
          UA: "Mozilla/5.0 Chrome/120.0.0.0"
        run: |
          mkdir -p data
          BASE="https://msi.nga.mil/api/publications/download?type=view&key=16694640/SFH00000"
          for F in DailyMemPAC.txt DailyMemXII.txt DailyMemLAN.txt DailyMemIV.txt DailyMemARC.txt; do
            curl -fsSL "$BASE/$F" -o "data/$F" || true
          done
          curl -sSL -A "$UA" -o data/maritimenz.html "https://www.maritimenz.govt.nz/navigational-warnings/" || true
          curl -sSL -A "$UA" -o data/rocketlab.html "https://rocketlabcorp.com/launch/launch-safety/" || true

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "Update NAVWARN data $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push