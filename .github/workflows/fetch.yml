name: Fetch NAVWARN Data

on:
  schedule:
    - cron: '0 0,6,12,18 * * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Fetch NGA MSI files
        run: |
          mkdir -p data
          BASE="https://msi.nga.mil/api/publications/download?type=view&key=16694640/SFH00000"
          for F in DailyMemPAC.txt DailyMemXII.txt DailyMemLAN.txt DailyMemIV.txt DailyMemARC.txt; do
            curl -fsSL "$BASE/$F" -o "data/$F" || true
          done

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "Update NAVWARN data $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
